<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FastAPI Todo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }

        .input-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        button#add-btn { padding: 10px 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; }

        .todo-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .todo-item:hover { background: #f9f9f9; }
        .todo-text { flex: 1; margin-left: 10px; cursor: pointer; }
        .completed { text-decoration: line-through; color: #bdc3c7; }

        .delete-btn { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 10px; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Мои задачи</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Что нужно сделать?">
        <button id="add-btn" onclick="addTask()">+</button>
    </div>

    <div id="todo-list">Загрузка...</div>
</div>

<script>
    const API_URL = '/tasks'; // Относительный путь, так как фронт и бэк на одном адресе

async function fetchTodos() {
    try {
        const response = await fetch(API_URL);
        const todos = await response.json();
        const listContainer = document.getElementById('todo-list');

        // Генерируем новый HTML
        let html = '';
        todos.forEach(todo => {
            html += `
                <div class="todo-item">
                    <input type="checkbox" ${todo.is_completed ? 'checked' : ''}
                        onclick="toggleTask(${todo.id}, '${todo.name}', ${todo.is_completed})">
                    <span class="todo-text ${todo.is_completed ? 'completed' : ''}">${todo.name}</span>
                    <button class="delete-btn" onclick="deleteTask(${todo.id})">✕</button>
                </div>
            `;
        });

        // Обновляем только если данные реально изменились или список пуст
        if (listContainer.innerHTML !== html) {
            listContainer.innerHTML = html;
        }
    } catch (e) {
        console.log("Ошибка обновления");
    }
}

// Вызываем функции обновления после действий
async function addTask() {
    const input = document.getElementById('taskInput');
    if (!input.value) return;
    await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: input.value })
    });
    input.value = '';
    fetchTodos(); // Обновить сразу
}

async function deleteTask(id) {
    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    fetchTodos(); // Обновить сразу
}

async function toggleTask(id, name, status) {
    await fetch(`${API_URL}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, is_completed: !status })
    });
    fetchTodos(); // Обновить сразу
}

// Запуск при старте и каждые 3 секунды для синхронизации между устройствами
fetchTodos();
setInterval(fetchTodos, 2000);
</script>


</body>
</html>
